<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Heart Animation Effect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        canvas {
        position: absolute;
        left:0;
        top: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        pointer-events: none;
        }
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background: radial-gradient(circle at 50% 18%, rgba(255, 38, 38, 0.06), transparent 26%), linear-gradient(180deg, #0b0406 0%, #060101 100%);
}

.love {
  position: absolute;
  left: 50%;
  top: 2%;
  color: transparent;
  transform: translate(-50%, -50%);
  z-index: 999;
  font-weight: 90;
  font-size: clamp(40px, 5vw, 110px);
  animation: beat 1.08s ease-in-out infinite;
  display: inline-block;
  white-space: nowrap; /* keep words together */
  user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
  touch-action: manipulation; /* better mobile tap handling */
  padding: 14px 22px; /* larger tap target */
  border-radius: 18px;
  cursor: pointer;
  letter-spacing: 0.02em;
  background-image: linear-gradient(95deg, #ff8d56, #ff3349 45%, #d60b1f);
  -webkit-background-clip: text;
  background-clip: text;
  text-shadow: 0 10px 24px rgba(255, 68, 68, 0.24), 0 4px 12px rgba(0, 0, 0, 0.14);
}

@media (max-width: 1024px) {
  .love {
    font-size: clamp(44px, 14vw, 92px);
    top: 2%;
    padding: 10px 16px;
    text-shadow: 0 12px 30px rgba(255, 68, 68, 0.32), 0 6px 16px rgba(0, 0, 0, 0.18);
    filter: drop-shadow(0 0 0.35rem rgba(212, 46, 46, 0.24));
  }
}

@media (min-width: 1200px) {
  .love {
    font-size: clamp(38px, 5vw, 86px);
    top: 5%;
  }
}

.love .big { font-size: 0.72em; margin-right: 14px; display: inline-block; vertical-align: middle; }

.love::before,
.love::after {
  content: '❤';
  position: absolute;
  font-size: 24px;
  opacity: 0.92;
  transform-origin: center;
}
.love::before { left: -38px; top: -18px; color: #ff2f2f; animation: float1 3.2s ease-in-out infinite; }
.love::after  { right: -38px; top: -18px; color: #ff8b7a; animation: float2 3.8s ease-in-out infinite; }

@keyframes beat {
  0% { transform: translate(-50%, -50%) scale(1); }
  28% { transform: translate(-50%, -50%) scale(1.095); }
  45% { transform: translate(-50%, -50%) scale(0.98); }
  65% { transform: translate(-50%, -50%) scale(1.03); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

@keyframes float1 {
  0% { transform: translateY(0) scale(1); opacity: .9 }
  50% { transform: translateY(-14px) scale(1.15); opacity: .6 }
  100% { transform: translateY(0) scale(1); opacity: .9 }
}
@keyframes float2 {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: .9 }
  50% { transform: translateY(-20px) rotate(-10deg) scale(1.1); opacity: .5 }
  100% { transform: translateY(0) rotate(0deg) scale(1); opacity: .9 }
}
    </style>
  </head>
  <body>  
        <canvas id="heart"></canvas>

<p class="love"><span class="big">Big</span> <span class="love-word">Love</span></p>





<!--JavaScript-->
<script src="script.js"></script>

  </body>
</html>
