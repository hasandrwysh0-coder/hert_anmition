<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Heart Animation Effect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        canvas {
        position: absolute;
        left:0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,.2);

        }
        pointer-events: none; /* allow touches/clicks to pass through to text */
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
}

.love {
  position: absolute;
  left: 50%;
  
  transform: translate(-50%, -50%);
  z-index: 2;
  font-weight: 800;
  font-size: 86px;
  line-height: 1;
  text-transform: capitalize;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  background-image: linear-gradient(90deg, #ff6b6b, #ffb86b, #ff6bd1);
  text-shadow: 0 6px 18px rgba(0,0,0,0.25);
  animation: beat 1.1s ease-in-out infinite;
  display: inline-block;
}

.love .big { font-size: 0.7em; margin-right: 12px; display: inline-block; vertical-align: middle; }
.love {
  position: absolute;
  left: 50%;
  top: 2%;
  transform: translate(-50%, -50%);
  z-index: 999;
  font-weight: 800;
  font-size: clamp(36px, 9.5vw, 96px);
  line-height: 1;
  text-transform: capitalize;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  background-image: linear-gradient(90deg, #ff6b6b, #ffb86b, #ff6bd1);
  text-shadow: 0 6px 18px rgba(0,0,0,0.25);
  animation: beat 1.1s ease-in-out infinite;
  display: inline-block;
  white-space: nowrap; /* keep words together */
  user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
  touch-action: manipulation; /* better mobile tap handling */
  padding: 10px 18px; /* larger tap target */
  border-radius: 14px;
}
.love::before,
.love::after {
  content: '❤';
  position: absolute;
  font-size: 22px;
  opacity: 0.9;
  transform-origin: center;
}
.love::before { left: -36px; top: -18px; color: #ff6b6b; animation: float1 3s ease-in-out infinite; }
.love::after  { right: -36px; top: -18px; color: #ffb86b; animation: float2 3.6s ease-in-out infinite; }

@keyframes beat {
  0% { transform: translate(-50%, -50%) scale(1); }
  30% { transform: translate(-50%, -50%) scale(1.08); }
  60% { transform: translate(-50%, -50%) scale(0.98); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

@keyframes float1 {
  0% { transform: translateY(0) scale(1); opacity: .9 }
  50% { transform: translateY(-14px) scale(1.15); opacity: .6 }
  100% { transform: translateY(0) scale(1); opacity: .9 }
}
@keyframes float2 {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: .9 }
  50% { transform: translateY(-20px) rotate(-10deg) scale(1.1); opacity: .5 }
  100% { transform: translateY(0) rotate(0deg) scale(1); opacity: .9 }
}
    </style>
  </head>
  <body>  
        <canvas id="heart"></canvas>

<p class="love"><span class="big">Big</span> <span class="love-word">Love</span></p>





        <!--JavaScript-->
        <script src="script.js"></script>


  </body>
</html>
